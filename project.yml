name: MacControlMCP
options:
  bundleIdPrefix: com.nuclearcyborg.maccontrol
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_NAME: "$(TARGET_NAME)"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: "NO"
    # Native-bundle version. Keep in lockstep with AppVersion.swift (the compiled-in source of
    # truth every target reports); the "Verify version" pre-build phase fails the build on drift.
    MARKETING_VERSION: "0.2.4"
    CURRENT_PROJECT_VERSION: "6"

targets:
  MacControlMCPCore:
    type: library.static
    platform: macOS
    sources: [Sources/MacControlMCPCore]

  AXKit:
    type: library.static
    platform: macOS
    sources: [Sources/AXKit]
    dependencies:
      - target: MacControlMCPCore

  CaptureKit:
    type: library.static
    platform: macOS
    sources: [Sources/CaptureKit]
    dependencies:
      - target: MacControlMCPCore

  InputKit:
    type: library.static
    platform: macOS
    sources: [Sources/InputKit]
    dependencies:
      - target: MacControlMCPCore

  HostKit:
    type: library.static
    platform: macOS
    sources: [Sources/HostKit]
    dependencies:
      - target: MacControlMCPCore
      - target: AXKit
      - target: CaptureKit
      - target: InputKit

  # Same sources as the SPM executable `MacControlMCP` (Package.swift); named differently
  # because the project and MacControlApp's PRODUCT_NAME already claim "MacControlMCP".
  # AXProbe is deliberately SPM-only. Keep dependencies in sync with Package.swift by hand.
  MacControlStdio:
    type: tool
    platform: macOS
    sources: [Sources/MacControlMCP]
    dependencies:
      - target: HostKit
      - target: AXKit
      - target: CaptureKit
      - target: InputKit
      - target: MacControlMCPCore

  MacControlHost:
    type: application
    platform: macOS
    sources: [Sources/MacControlHost]
    info:
      path: Generated/MacControlHost-Info.plist
      properties:
        CFBundleIdentifier: com.nuclearcyborg.maccontrol.host
        CFBundleName: MacControlHost
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuclearcyborg.maccontrol.host
    dependencies:
      - target: HostKit
      - target: AXKit
      - target: CaptureKit
      - target: InputKit
      - target: MacControlMCPCore

  MacControlRelay:
    type: tool
    platform: macOS
    sources: [Sources/MacControlRelay]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuclearcyborg.maccontrol.relay
    dependencies:
      - target: HostKit
      - target: AXKit
      - target: CaptureKit
      - target: InputKit
      - target: MacControlMCPCore

  MacControlRegistrar:
    type: tool
    platform: macOS
    sources: [Sources/MacControlRegistrar]

  MacControlApp:
    type: application
    platform: macOS
    sources: [Sources/MacControlApp]
    info:
      path: Generated/MacControlMCP-Info.plist
      properties:
        CFBundleName: MacControlMCP
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
    settings:
      base:
        PRODUCT_NAME: MacControlMCP
        PRODUCT_BUNDLE_IDENTIFIER: com.nuclearcyborg.maccontrol
    dependencies:
      - target: MacControlHost
        embed: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
      - target: MacControlRelay
        embed: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
      - target: HostKit
      - target: AXKit
      - target: CaptureKit
      - target: InputKit
      - target: MacControlMCPCore
    preBuildScripts:
      - name: Verify version
        basedOnDependencyAnalysis: false
        script: |
          # Keep marketing version AND build number in lockstep between project.yml (the bundle
          # Info.plists) and AppVersion.swift (what every component reports at runtime / over MCP).
          # scripts/bump-version.sh advances both together on each install; this guards a hand-edit
          # that touched only one.
          APPVER="${SRCROOT}/Sources/MacControlMCPCore/AppVersion.swift"
          SWIFT_MARKETING=$(grep -oE 'marketingVersion = "[^"]+"' "$APPVER" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SWIFT_BUILD=$(grep -oE 'buildNumber = "[^"]+"' "$APPVER" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$SWIFT_MARKETING" != "$MARKETING_VERSION" ] || [ "$SWIFT_BUILD" != "$CURRENT_PROJECT_VERSION" ]; then
            echo "error: version drift — AppVersion.swift is $SWIFT_MARKETING ($SWIFT_BUILD) but project.yml is $MARKETING_VERSION ($CURRENT_PROJECT_VERSION). Set both to the same value."
            exit 1
          fi
    postCompileScripts:
      - name: Copy LaunchAgent plist
        inputFiles:
          - $(SRCROOT)/packaging/host.launchagent.plist
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchAgents/com.nuclearcyborg.maccontrol.host.plist
        script: |
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchAgents"
          mkdir -p "$DEST"
          cp "${SRCROOT}/packaging/host.launchagent.plist" "$DEST/com.nuclearcyborg.maccontrol.host.plist"

  MacControlMCPCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/MacControlMCPCoreTests]
    dependencies:
      - target: MacControlMCPCore

  AXKitTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/AXKitTests]
    dependencies:
      - target: AXKit
      - target: MacControlMCPCore

  CaptureKitTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/CaptureKitTests]
    dependencies:
      - target: CaptureKit
      - target: MacControlMCPCore

  InputKitTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/InputKitTests]
    dependencies:
      - target: InputKit
      - target: MacControlMCPCore

  HostKitTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/HostKitTests]
    dependencies:
      - target: HostKit
      - target: AXKit
      - target: CaptureKit
      - target: InputKit
      - target: MacControlMCPCore

schemes:
  All:
    build:
      targets:
        MacControlApp: all
        MacControlStdio: all
        MacControlHost: all
        MacControlRelay: all
        MacControlRegistrar: all
        MacControlMCPCoreTests: [test]
        AXKitTests: [test]
        CaptureKitTests: [test]
        InputKitTests: [test]
        HostKitTests: [test]
    test:
      targets:
        - MacControlMCPCoreTests
        - AXKitTests
        - CaptureKitTests
        - InputKitTests
        - HostKitTests
      gatherCoverageData: false

  Release:
    build:
      targets:
        MacControlApp: all
    run:
      config: Release
    archive:
      config: Release
